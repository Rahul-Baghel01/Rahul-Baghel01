<defs>

<linearGradient
id="card"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#111827"/>
<stop offset="100%" stop-color="#1E1B4B"/>

</linearGradient>

<linearGradient
id="border">

<stop offset="0%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#8B5CF6"/>

</linearGradient>

<filter id="shadow">

<feDropShadow
