<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title description">
  <title id="title">Rahul Baghel — Full Stack Developer and AI Engineer</title>
  <desc id="description">A cyber blue and purple developer workspace with skills and a code editor.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07152d"/><stop offset=".52" stop-color="#111d4d"/><stop offset="1" stop-color="#261044"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset=".48" stop-color="#7087ff"/><stop offset="1" stop-color="#d946ef"/></linearGradient>
