  </defs>
  <rect width="1200" height="430" rx="26" fill="url(#background)"/><rect width="1200" height="430" rx="26" fill="url(#grid)"><animate attributeName="opacity" values=".45;.9;.45" dur="8s" repeatCount="indefinite"/></rect>
  <circle cx="105" cy="55" r="170" fill="url(#orb)" filter="url(#blur)"><animate attributeName="cx" values="105;245;105" dur="12s" repeatCount="indefinite"/></circle><circle cx="1090" cy="370" r="220" fill="#a855f7" opacity=".16" filter="url(#blur)"><animate attributeName="cy" values="370;290;370" dur="10s" repeatCount="indefinite"/></circle>
  <g fill="#a5f3fc"><circle cx="48" cy="78" r="2"><animate attributeName="cy" values="78;58;78" dur="4s" repeatCount="indefinite"/></circle><circle cx="642" cy="48" r="2"><animate attributeName="cy" values="48;70;48" dur="5s" repeatCount="indefinite"/></circle><circle cx="1138" cy="112" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="3s" repeatCount="indefinite"/></circle></g>
