<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
width="1600"
height="500"
viewBox="0 0 1600 500">

<defs>

<!-- ========================= -->

<!-- Background -->

<!-- ========================= -->

<linearGradient
id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#040817"/>

<stop offset="45%" stop-color="#0F172A"/>

<stop offset="100%" stop-color="#1E1B4B"/>

</linearGradient>

<!-- ========================= -->

<!-- Hero Gradient -->

<!-- ========================= -->

<linearGradient
id="heroText"
x1="0%"
y1="0%"
x2="100%"
y2="0%">

<stop offset="0%"
stop-color="#60A5FA"/>

<stop offset="100%"
stop-color="#A855F7"/>

</linearGradient>

<!-- ========================= -->

<!-- Card -->

<!-- ========================= -->

<linearGradient
id="card"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%"
stop-color="#111827"/>

<stop offset="100%"
stop-color="#1F2937"/>

</linearGradient>

<!-- ========================= -->

<!-- Blue Glow -->

<!-- ========================= -->

<radialGradient
id="blueGlow">

<stop
offset="0%"
stop-color="#3B82F6"
stop-opacity=".45"/>

<stop
offset="100%"
stop-color="#3B82F6"
stop-opacity="0"/>

</radialGradient>

<!-- ========================= -->

<!-- Purple Glow -->

<!-- ========================= -->

<radialGradient
id="purpleGlow">

<stop
offset="0%"
stop-color="#8B5CF6"
stop-opacity=".45"/>

<stop
offset="100%"
stop-color="#8B5CF6"
stop-opacity="0"/>

</radialGradient>

<!-- ========================= -->

<!-- Cyan Glow -->

<!-- ========================= -->

<radialGradient
id="cyanGlow">

<stop
offset="0%"
stop-color="#22D3EE"
stop-opacity=".18"/>

<stop
offset="100%"
stop-color="#22D3EE"
stop-opacity="0"/>

</radialGradient>

<!-- ========================= -->

<!-- Grid -->

<!-- ========================= -->

<pattern
id="grid"
width="50"
height="50"
patternUnits="userSpaceOnUse">

<path
d="M50 0H0V50"
fill="none"
stroke="#60A5FA"
stroke-opacity=".06"
stroke-width="1"/>

</pattern>

<!-- ========================= -->

<!-- Shadow -->

<!-- ========================= -->

<filter id="shadow">

<feDropShadow
dx="0"
dy="10"
stdDeviation="12"
flood-opacity=".35"/>

</filter>

</defs>

<!-- ========================= -->

<!-- Background -->

<!-- ========================= -->

<rect
width="1600"
height="500"
fill="url(#bg)"/>

<!-- Blue -->

<circle
cx="220"
cy="120"
r="240"
fill="url(#blueGlow)">

<animate
attributeName="opacity"
values=".2;.45;.2"
dur="8s"
repeatCount="indefinite"/>

</circle>

<!-- Purple -->

<circle
cx="1380"
cy="360"
r="260"
fill="url(#purpleGlow)">

<animate
attributeName="opacity"
values=".25;.4;.25"
dur="10s"
repeatCount="indefinite"/>

</circle>

<!-- Cyan -->

<circle
cx="800"
cy="250"
r="170"
fill="url(#cyanGlow)">

<animate
attributeName="r"
values="170;190;170"
dur="9s"
repeatCount="indefinite"/>

</circle>

<!-- Grid -->

<rect
width="1600"
height="500"
fill="url(#grid)"/>

<!-- ========================= -->

<!-- Floating Particles -->

<!-- ========================= -->

<g fill="#FFFFFF">

<circle cx="80" cy="70" r="2">
<animate attributeName="cy"
values="70;45;70"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="220" cy="180" r="3">
<animate attributeName="cy"
values="180;155;180"
dur="11s"
repeatCount="indefinite"/>
</circle>

<circle cx="390" cy="120" r="2">
<animate attributeName="cy"
values="120;90;120"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="560" cy="260" r="3">
<animate attributeName="cy"
values="260;230;260"
dur="10s"
repeatCount="indefinite"/>
</circle>

<circle cx="760" cy="90" r="2">
<animate attributeName="cy"
values="90;60;90"
dur="7s"
repeatCount="indefinite"/>
</circle>

<circle cx="980" cy="330" r="3">
<animate attributeName="cy"
values="330;300;330"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="1180" cy="140" r="2">
<animate attributeName="cy"
values="140;110;140"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="1450" cy="220" r="3">
<animate attributeName="cy"
values="220;190;220"
dur="11s"
repeatCount="indefinite"/>
</circle>

</g>
<!-- ================================================= -->
<!-- HERO CONTENT -->
<!-- ================================================= -->

<g filter="url(#shadow)">

  <text
      x="120"
      y="150"
      font-family="Segoe UI"
      font-size="72"
      font-weight="700"
      fill="url(#heroText)">

      Rahul Baghel

  </text>

  <text
      x="120"
      y="205"
      font-family="Segoe UI"
      font-size="30"
      fill="#E2E8F0">

      Full Stack Developer • AI Engineer

  </text>

  <text
      x="120"
      y="245"
      font-family="Segoe UI"
      font-size="22"
      fill="#94A3B8">

      Building AI-powered products with modern web technologies.

  </text>

</g>

<!-- ================================================= -->
<!-- BUTTONS -->
<!-- ================================================= -->

<g>

  <!-- Internship -->

  <rect
      x="120"
      y="290"
      width="250"
      height="52"
      rx="26"
      fill="#2563EB"/>

  <text
      x="245"
      y="323"
      text-anchor="middle"
      font-family="Segoe UI"
      font-size="20"
      fill="white">

      Open to Internship

  </text>

  <!-- GitHub -->

  <rect
      x="390"
      y="290"
      width="150"
      height="52"
      rx="26"
      fill="#1F2937"
      stroke="#3B82F6"/>

  <text
      x="465"
      y="323"
      text-anchor="middle"
      font-family="Segoe UI"
      font-size="18"
      fill="white">

      GitHub

  </text>

  <!-- LinkedIn -->

  <rect
      x="560"
      y="290"
      width="170"
      height="52"
      rx="26"
      fill="#1F2937"
      stroke="#3B82F6"/>

  <text
      x="645"
      y="323"
      text-anchor="middle"
      font-family="Segoe UI"
      font-size="18"
      fill="white">

      LinkedIn

  </text>

</g>

<!-- ================================================= -->
<!-- SKILLS -->
<!-- ================================================= -->

<g font-family="Segoe UI" font-size="18">

  <rect x="120" y="390" rx="18" width="95" height="38" fill="#2563EB"/>
  <text x="168" y="415" text-anchor="middle" fill="white">React</text>

  <rect x="230" y="390" rx="18" width="110" height="38" fill="#4F46E5"/>
  <text x="285" y="415" text-anchor="middle" fill="white">Next.js</text>

  <rect x="355" y="390" rx="18" width="95" height="38" fill="#2563EB"/>
  <text x="403" y="415" text-anchor="middle" fill="white">Node.js</text>

  <rect x="465" y="390" rx="18" width="80" height="38" fill="#0F766E"/>
  <text x="505" y="415" text-anchor="middle" fill="white">Java</text>

  <rect x="560" y="390" rx="18" width="120" height="38" fill="#7C3AED"/>
  <text x="620" y="415" text-anchor="middle" fill="white">MongoDB</text>

  <rect x="695" y="390" rx="18" width="65" height="38" fill="#0891B2"/>
  <text x="728" y="415" text-anchor="middle" fill="white">AI</text>

</g>

<!-- ================================================= -->
<!-- VS CODE WINDOW -->
<!-- ================================================= -->

<g filter="url(#shadow)">

  <!-- Window -->

  <rect
      x="900"
      y="70"
      width="600"
      height="340"
      rx="20"
      fill="url(#card)"
      stroke="#334155"
      stroke-width="2"/>

  <!-- Top Bar -->

  <rect
      x="900"
      y="70"
      width="600"
      height="42"
      rx="20"
      fill="#111827"/>

  <!-- Mac Buttons -->

  <circle cx="930" cy="91" r="6" fill="#FF5F56"/>
  <circle cx="952" cy="91" r="6" fill="#FFBD2E"/>
  <circle cx="974" cy="91" r="6" fill="#27C93F"/>

  <text
      x="1180"
      y="97"
      text-anchor="middle"
      font-family="Segoe UI"
      font-size="16"
      fill="#94A3B8">

      developer.ts

  </text>

  <!-- Line Numbers -->

  <g
      font-family="Consolas"
      font-size="18"
      fill="#475569">

      <text x="930" y="145">1</text>
      <text x="930" y="175">2</text>
      <text x="930" y="205">3</text>
      <text x="930" y="235">4</text>
      <text x="930" y="265">5</text>
      <text x="930" y="295">6</text>
      <text x="930" y="325">7</text>

  </g>

  <!-- Code -->

  <g
      font-family="Consolas"
      font-size="20">

      <text x="970" y="145" fill="#60A5FA">
const
      </text>

      <text x="1040" y="145" fill="#F8FAFC">
developer
      </text>

      <text x="1165" y="145" fill="#FBBF24">
=
      </text>

      <text x="1195" y="145" fill="#F8FAFC">
{
      </text>

      <text x="1000" y="175" fill="#A855F7">
name:
      </text>

      <text x="1110" y="175" fill="#22D3EE">
"Rahul Baghel",
      </text>

      <text x="1000" y="205" fill="#A855F7">
role:
      </text>

      <text x="1110" y="205" fill="#22D3EE">
"Full Stack",
      </text>

      <text x="1000" y="235" fill="#A855F7">
focus:
      </text>

      <text x="1110" y="235" fill="#22D3EE">
"AI Products",
      </text>

      <text x="1000" y="265" fill="#A855F7">
stack:
      </text>

      <text x="1110" y="265" fill="#22D3EE">
["React","Node"],
      </text>

      <text x="1000" y="295" fill="#A855F7">
status:
      </text>

      <text x="1110" y="295" fill="#34D399">
"Open to Internship"
      </text>

      <text x="970" y="325" fill="#F8FAFC">
}
      </text>

  </g>

  <!-- Cursor -->

  <rect
      x="987"
      y="309"
      width="3"
      height="22"
      fill="#FFFFFF">

      <animate
          attributeName="opacity"
          values="1;0;1"
          dur="1s"
          repeatCount="indefinite"/>

  </rect>

</g>

<!-- ================================================= -->
<!-- FLOATING TECH BADGES -->
<!-- ================================================= -->

<g font-family="Segoe UI" font-size="16" font-weight="600">

  <!-- React -->
  <g>
    <circle cx="860" cy="60" r="24" fill="#0F172A" stroke="#61DAFB" stroke-width="2"/>
    <text x="860" y="66" text-anchor="middle" fill="#61DAFB">R</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -8;0 0"
      dur="6s"
      repeatCount="indefinite"/>
  </g>

  <!-- Next -->
  <g>
    <circle cx="1480" cy="40" r="24" fill="#0F172A" stroke="#FFFFFF" stroke-width="2"/>
    <text x="1480" y="46" text-anchor="middle" fill="#FFFFFF">N</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 8;0 0"
      dur="7s"
      repeatCount="indefinite"/>
  </g>

  <!-- Node -->
  <g>
    <circle cx="1520" cy="430" r="24" fill="#0F172A" stroke="#22C55E" stroke-width="2"/>
    <text x="1520" y="436" text-anchor="middle" fill="#22C55E">Node</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -8;0 0"
      dur="8s"
      repeatCount="indefinite"/>
  </g>

  <!-- Java -->
  <g>
    <circle cx="860" cy="430" r="24" fill="#0F172A" stroke="#F97316" stroke-width="2"/>
    <text x="860" y="436" text-anchor="middle" fill="#F97316">J</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 8;0 0"
      dur="7.5s"
      repeatCount="indefinite"/>
  </g>

</g>

<!-- ================================================= -->
<!-- AI ORB -->
<!-- ================================================= -->

<g>

  <circle
      cx="1260"
      cy="430"
      r="45"
      fill="#3B82F6"
      opacity=".12">

      <animate
          attributeName="r"
          values="42;52;42"
          dur="5s"
          repeatCount="indefinite"/>

  </circle>

  <circle
      cx="1260"
      cy="430"
      r="20"
      fill="#60A5FA">

      <animate
          attributeName="opacity"
          values=".6;1;.6"
          dur="3s"
          repeatCount="indefinite"/>

  </circle>

</g>

<!-- ================================================= -->
<!-- DECORATIVE LINES -->
<!-- ================================================= -->

<g
stroke="#3B82F6"
stroke-opacity=".15"
stroke-width="1">

<line x1="800" y1="250" x2="900" y2="170"/>
<line x1="1450" y1="120" x2="1500" y2="220"/>
<line x1="780" y1="420" x2="900" y2="330"/>

</g>

<!-- ================================================= -->
<!-- FOOTER LABEL -->
<!-- ================================================= -->

<text
    x="800"
    y="485"
    text-anchor="middle"
    font-family="Segoe UI"
    font-size="16"
    fill="#64748B">

Designed &amp; Built by Rahul Baghel • 2026

</text>

</svg>