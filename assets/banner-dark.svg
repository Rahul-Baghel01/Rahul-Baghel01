<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Rahul Baghel — Full Stack Developer and AI Engineer</title><desc id="desc">A futuristic developer workspace in cyber blue and purple.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#071226"/><stop offset=".52" stop-color="#111b46"/><stop offset="1" stop-color="#260f46"/></linearGradient>
    <linearGradient id="neon" x2="1"><stop stop-color="#22d3ee"/><stop offset=".52" stop-color="#6d7cff"/><stop offset="1" stop-color="#d946ef"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#8be9fd" stroke-opacity=".08"/></pattern>
  </defs>
  <rect width="1200" height="360" rx="24" fill="url(#bg)"/><rect width="1200" height="360" rx="24" fill="url(#grid)"/>
  <ellipse cx="150" cy="40" rx="230" ry="110" fill="#22d3ee" opacity=".12" filter="url(#glow)"><animate attributeName="cx" values="150;310;150" dur="9s" repeatCount="indefinite"/></ellipse>
  <ellipse cx="1040" cy="300" rx="260" ry="130" fill="#a855f7" opacity=".14" filter="url(#glow)"><animate attributeName="cx" values="1040;910;1040" dur="11s" repeatCount="indefinite"/></ellipse>
  <g fill="#67e8f9" opacity=".8"><circle cx="80" cy="78" r="2"><animate attributeName="cy" values="78;58;78" dur="4s" repeatCount="indefinite"/></circle><circle cx="670" cy="52" r="2"/><circle cx="1090" cy="88" r="3"><animate attributeName="cy" values="88;108;88" dur="5s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(60 62)"><rect width="650" height="235" rx="20" fill="#0b1534" fill-opacity=".68" stroke="url(#neon)" stroke-opacity=".75"/>
    <text x="34" y="49" fill="#8be9fd" font-family="ui-monospace,Consolas" font-size="14">// build. learn. ship.</text>
    <text x="34" y="103" fill="white" font-family="Arial,sans-serif" font-size="42" font-weight="700">Rahul Baghel</text>
    <text x="34" y="140" fill="#b9c7ff" font-family="Arial,sans-serif" font-size="20">Full Stack Developer <tspan fill="#7dd3fc">×</tspan> AI Engineer</text>
    <text x="34" y="183" fill="#a5b4fc" font-family="ui-monospace,Consolas" font-size="15">const impact = ideas.map(build).filter(useful);<tspan fill="#67e8f9">▌</tspan></text>
    <g transform="translate(34 201)" font-family="Arial" font-size="12"><rect width="90" height="25" rx="12" fill="#12355b"/><text x="14" y="17" fill="#a5f3fc">OPEN SOURCE</text><rect x="102" width="68" height="25" rx="12" fill="#30235d"/><text x="116" y="17" fill="#ddd6fe">AI BUILDER</text></g>
  </g>
  <g transform="translate(766 65)"><rect width="365" height="230" rx="18" fill="#0d1737" fill-opacity=".78" stroke="#78dfff" stroke-opacity=".35"/><circle cx="35" cy="35" r="7" fill="#22c55e" filter="url(#glow)"/><text x="52" y="40" fill="#c4f5ff" font-family="ui-monospace,Consolas" font-size="14">developer.workspace</text><path d="M28 72h309M28 190h309" stroke="#5873a8" opacity=".45"/>
    <text x="28" y="105" fill="#c084fc" font-family="ui-monospace,Consolas" font-size="14">01</text><text x="60" y="105" fill="#e2e8f0" font-family="ui-monospace,Consolas" font-size="14">crafting AI products</text><text x="28" y="135" fill="#67e8f9" font-family="ui-monospace,Consolas" font-size="14">02</text><text x="60" y="135" fill="#e2e8f0" font-family="ui-monospace,Consolas" font-size="14">shipping clean systems</text><text x="28" y="165" fill="#f0abfc" font-family="ui-monospace,Consolas" font-size="14">03</text><text x="60" y="165" fill="#e2e8f0" font-family="ui-monospace,Consolas" font-size="14">learning in public</text>
  </g>
</svg>
