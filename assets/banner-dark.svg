</text><text x="216" y="16">Java</text><text x="272" y="16">MongoDB</text><text x="360" y="16">AI</text><text x="445" y="16">Open Source</text></g></g></g>
  <g transform="translate(713 70)" filter="url(#shadow)"><rect width="438" height="296" rx="20" fill="#09152f" stroke="#6784c8" stroke-opacity=".65"/><path d="M0 44h438" stroke="#405a91"/><circle cx="27" cy="22" r="6" fill="#fb7185"/><circle cx="49" cy="22" r="6" fill="#fbbf24"/><circle cx="71" cy="22" r="6" fill="#34d399"/><text x="102" y="27" fill="#9fb4e9" font-family="ui-monospace,Consolas" font-size="13">developer.profile.ts</text><g font-family="ui-monospace,Consolas" font-size="14"><text x="27" y="80" fill="#818cf8">const</text><text x="70" y="80" fill="#f8fafc"> developer = {</text><text x="48" y="112" fill="#67e8f9">name:</text><text x="104" y="112" fill="#fda4af"> "Rahul Baghel",</text><text x="48" y="142" fill="#67e8f9">role:</text><text x="104" y="142" fill="#fda4af"> "Full Stack Developer",</text><text x="48" y="172" fill="#67e8f9">focus:</text><text x="104" y="172" fill="#fda4af"> "AI Products",</text><text x="48" y="202" fill="#67e8f9">stack:</text><text x="104" y="202" fill="#fbbf24"> ["React","Next.js",</text><text x="104" y="224" fill="#fbbf24"> "Node.js","Java"],</text><text x="48" y="254" fill="#67e8f9">status:</text><text x="112" y="254" fill="#86efac"> "Open to Internship"</text><text x="27" y="280" fill="#f8fafc">};<tspan fill="#67e8f9">▌</tspan></text></g><path d="M397 62v210" stroke="url(#accent)" stroke-width="2" opacity=".8"><animate attributeName="stroke-opacity" values=".2;1;.2" dur="2.2s" repeatCount="indefinite"/></path></g>
</svg>
