<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
width="900"
height="420"
viewBox="0 0 900 420">

<defs>

<linearGradient
id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#111827"/>
<stop offset="100%" stop-color="#1E1B4B"/>

</linearGradient>

<linearGradient
id="border">

<stop offset="0%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#8B5CF6"/>

</linearGradient>

<linearGradient
id="bar">

<stop offset="0%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#8B5CF6"/>

</linearGradient>

<filter id="shadow">

<feDropShadow
dx="0"
dy="10"
stdDeviation="12"
flood-opacity=".35"/>

</filter>

</defs>

<!-- Card -->

<rect
x="15"
y="15"
width="870"
height="390"
rx="30"
fill="url(#bg)"
stroke="url(#border)"
stroke-width="6"
filter="url(#shadow)"/>

<!-- ================================================= -->
<!-- TITLE -->
<!-- ================================================= -->

<text
x="450"
y="60"
text-anchor="middle"
font-family="Segoe UI"
font-size="34"
font-weight="700"
fill="#38BDF8">

Tech Stack

</text>

<line
x1="60"
y1="90"
x2="840"
y2="90"
stroke="#334155"
stroke-width="2"/>

