<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0F172A"/>
<stop offset="100%" stop-color="#1E1B4B"/>
</linearGradient>

<linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FBBF24"/>
<stop offset="100%" stop-color="#F59E0B"/>
</linearGradient>

<linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#8B5CF6"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="12"
flood-color="#000000"
flood-opacity=".4"/>
</filter>

</defs>

<rect
width="900"
height="420"
rx="30"
fill="url(#bg)"
filter="url(#shadow)"/>

<text
x="450"
y="50"
text-anchor="middle"
font-size="32"
fill="#38BDF8"
font-family="Segoe UI"
font-weight="700">

Achievements

</text>

<!-- Trophy Card -->

<g>

<rect x="40" y="90" width="240" height="120" rx="20" fill="url(#purple)"/>

<text x="160" y="135" text-anchor="middle" font-size="42">🤖</text>

<text x="160" y="175" text-anchor="middle"
fill="white"
font-size="22">

AI Builder

</text>

</g>

<g>

<rect x="330" y="90" width="240" height="120" rx="20" fill="url(#purple)"/>

<text x="450" y="135" text-anchor="middle" font-size="42">🚀</text>

<text x="450" y="175" text-anchor="middle"
fill="white"
font-size="22">

Full Stack

</text>

</g>

<g>

<rect x="620" y="90" width="240" height="120" rx="20" fill="url(#purple)"/>

<text x="740" y="135" text-anchor="middle" font-size="42">💻</text>

<text x="740" y="175" text-anchor="middle"
fill="white"
font-size="22">

Open Source

</text>

</g>

<g>

<rect x="40" y="250" width="240" height="120" rx="20" fill="url(#gold)"/>

<text x="160" y="295" text-anchor="middle" font-size="42">⚛️</text>

<text x="160" y="335"
text-anchor="middle"
fill="white"
font-size="22">

React

</text>

</g>

<g>

<rect x="330" y="250" width="240" height="120" rx="20" fill="url(#gold)"/>

<text x="450" y="295" text-anchor="middle" font-size="42">🧠</text>

<text x="450" y="335"
text-anchor="middle"
fill="white"
font-size="22">

Problem Solver

</text>

</g>

<g>

<rect x="620" y="250" width="240" height="120" rx="20" fill="url(#gold)">

<animate
attributeName="opacity"
values="1;.7;1"
dur="2s"
repeatCount="indefinite"/>

</rect>

<text x="740" y="295"
text-anchor="middle"
font-size="42">

🌟

</text>

<text
x="740"
y="335"
text-anchor="middle"
fill="white"
font-size="22">

Internship Ready

</text>

</g>

</svg>